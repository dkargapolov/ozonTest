<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress</title>
    <link rel="stylesheet" href="./styles.css" />
</head>

<body>
    <main class="page">


        <section class="layout">
            <div class="layout__preview">
                <div id="progressHost" class="progress-host" aria-label="Progress host"></div>
            </div>

            <aside class="layout__controls" arial-label="Управление">
                <form class="panel" id="controlsForm" autocomplete="off">
                    <label class="field">
                        <span class="field__label">Значение</span>
                        <input id="valueInput" class="field__input" type="number" inputmode="numeric" min="0" max="100"
                            step="1" value="25" />
                        <small class="field__hint">
                            Пустое или некорректное значение будет приведено к 0, значения вне диапазона — к 0..100.
                        </small>
                    </label>

                    <div class="toggles">

                        <label class="toggle">
                            <span class="toggle__text">Animate</span>

                            <span class="switch">
                                <input id="animateToggle" type="checkbox">
                                <span class="slider"></span>
                            </span>

                        </label>

                        <label class="toggle">
                            <span class="toggle__text">Hide</span>

                            <span class="switch">
                                <input id="hideToggle" type="checkbox">
                                <span class="slider"></span>
                            </span>

                        </label>

                    </div>
                </form>
            </aside>
        </section>
    </main>

    <script type="module" src="./app.js"></script>
</body>

</html>
